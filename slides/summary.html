<div class="slide slide-summary">
    <div class="slide-category">Overview</div>
    <div class="slide-content animate-slide-up">
        <div class="summary-card">
            <h2>${nama}</h2>
            <!-- Baris Baru: Status Pekerjaan -->
            <div class="summary-row">
                <span class="summary-label">Status</span>
                <span class="summary-value" style="color: var(--accent-1);">${pekerjaan}</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Days Alive</span>
                <span class="summary-value">${hari}</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Zodiac</span>
                <span class="summary-value">${zodiac}</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Sign</span>
                <span class="summary-value">${shio}</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Stone</span>
                <span class="summary-value">${batu}</span>
            </div>
            <div class="summary-row" style="border:none;">
                <span class="summary-label">Gen</span>
                <span class="summary-value">${generasi}</span>
            </div>
        </div>
    </div>
</div>
